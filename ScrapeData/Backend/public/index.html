<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEHA — Player Stats</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #1e1d15;
    color: #e8e6d9;
    min-height: 100vh;
    font-size: 14px;
  }

  header {
    padding: 2rem 3rem 1.5rem;
    border-bottom: 1px solid #2e2d24;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
  }

  .title {
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #e8e6d9;
  }

  .subtitle {
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    color: #666;
    margin-top: 4px;
  }

  button {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 8px 20px;
    border: 1px solid #e8e6d9;
    background: transparent;
    color: #e8e6d9;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }

  button:hover { background: #e8e6d9; color: #1e1d15; }
  button:active { background: #fff; color: #1e1d15; }
  button:disabled { border-color: #444; color: #444; cursor: not-allowed; background: transparent; }

  .container { padding: 2rem 3rem; }

  .meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: #666;
  }

  #searchInput {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 6px 10px;
    border: 1px solid #2e2d24;
    background: #252419;
    border-radius: 2px;
    outline: none;
    width: 200px;
    color: #e8e6d9;
    display: none;
  }

  #searchInput::placeholder { color: #555; }
  #searchInput:focus { border-color: #666; }

  #errorMsg {
    display: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: #ff6b6b;
    margin-bottom: 1rem;
    padding: 10px 14px;
    border: 1px solid #3a2020;
    background: #2a1a1a;
    border-radius: 2px;
  }

  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #555;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid #2e2d24;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    background: #1e1d15;
  }

  thead th:hover { color: #e8e6d9; }
  thead th.sorted { color: #e8e6d9; }

  td {
    padding: 9px 12px;
    border-bottom: 1px solid #252419;
    color: #e8e6d9;
    white-space: nowrap;
  }

  tr:hover td { background: #252419; }
  tr:last-child td { border-bottom: none; }

  .mono { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #888; }

  .pos {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 2px;
    border: 1px solid #2e2d24;
    color: #aaa;
  }

  .empty {
    text-align: center;
    padding: 4rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: #444;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="title">WEHA — Player Stats</div>
    <div class="subtitle" id="subtitle">West Elk Hockey Association</div>
  </div>
  <button id="loadBtn" onclick="loadPlayers()">Load Players</button>
</header>

<div class="container">
  <div class="meta">
    <span class="count" id="countLabel"></span>
    <input type="text" id="searchInput" placeholder="Search..." oninput="filterTable()">
  </div>

  <div id="errorMsg"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortTable('PlayerID')">ID</th>
          <th onclick="sortTable('FirstName')">First</th>
          <th onclick="sortTable('LastName')">Last</th>
          <th>Pos</th>
          <th>#</th>
          <th onclick="sortTable('Goals')">G</th>
          <th onclick="sortTable('Assists')">A</th>
          <th onclick="sortTable('GamesPlayed')">GP</th>
          <th onclick="sortTable('Ppg')">PPG</th>
          <th onclick="sortTable('Gaa')">GAA</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="10"><div class="empty">Press "Load Players" to fetch data</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  let allPlayers = [];
  let sortCol = null;
  let sortAsc = true;

  const API_URL = (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost')
    ? 'http://127.0.0.1:5000' : '';

  function renderTable(players) {
    const tbody = document.getElementById('tableBody');
    if (!players.length) {
      tbody.innerHTML = '<tr><td colspan="10"><div class="empty">No results found</div></td></tr>';
      return;
    }
    tbody.innerHTML = players.map(p => `
      <tr>
        <td class="mono">${p.PlayerID}</td>
        <td>${p.FirstName || '—'}</td>
        <td>${p.LastName || '—'}</td>
        <td>${p.Position ? `<span class="pos">${p.Position}</span>` : '<span class="mono">—</span>'}</td>
        <td class="mono">${p.JerseyNumber || '—'}</td>
        <td class="mono">${p.Goals ?? '—'}</td>
        <td class="mono">${p.Assists ?? '—'}</td>
        <td class="mono">${p.GamesPlayed ?? '—'}</td>
        <td class="mono">${p.Ppg != null ? parseFloat(p.Ppg).toFixed(2) : '—'}</td>
        <td class="mono">${p.Gaa != null ? parseFloat(p.Gaa).toFixed(2) : '—'}</td>
      </tr>
    `).join('');
  }

  function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderTable(allPlayers.filter(p =>
      (p.FirstName || '').toLowerCase().includes(q) ||
      (p.LastName || '').toLowerCase().includes(q) ||
      (p.Position || '').toLowerCase().includes(q) ||
      String(p.PlayerID).includes(q)
    ));
  }

  function sortTable(col) {
    document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
    if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = true; }
    const cols = ['PlayerID','FirstName','LastName','Position','JerseyNumber','Goals','Assists','GamesPlayed','Ppg','Gaa'];
    const idx = cols.indexOf(col);
    if (idx >= 0) document.querySelectorAll('thead th')[idx].classList.add('sorted');
    allPlayers.sort((a, b) => {
      let av = a[col], bv = b[col];
      if (av == null) return 1; if (bv == null) return -1;
      if (typeof av === 'string') return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
      return sortAsc ? av - bv : bv - av;
    });
    filterTable();
  }

  async function loadPlayers() {
    const btn = document.getElementById('loadBtn');
    const subtitle = document.getElementById('subtitle');
    const countLabel = document.getElementById('countLabel');
    const errorMsg = document.getElementById('errorMsg');

    btn.disabled = true;
    btn.textContent = 'Loading...';
    errorMsg.style.display = 'none';

    try {
      const res = await fetch(`${API_URL}/api/getPlayers`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const players = await res.json();
      allPlayers = players;
      renderTable(players);
      countLabel.textContent = `${players.length} players`;
      subtitle.textContent = `${players.length} players loaded`;
      document.getElementById('searchInput').style.display = 'block';
      btn.textContent = 'Refresh';
    } catch (err) {
      errorMsg.style.display = 'block';
      errorMsg.textContent = `Error: ${err.message}`;
      btn.textContent = 'Try Again';
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
